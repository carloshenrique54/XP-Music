<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A341FF" />
      <stop offset="100%" stop-color="#8431D0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="#140027" stroke="#2D1050" stroke-width="12" />
  <circle cx="256" cy="256" r="140" fill="#CC7EFC" opacity="0.15" filter="url(#glow)" />
  <text x="50%" y="58%" font-family="sans-serif" font-weight="900" font-size="220" fill="url(#gradient)" text-anchor="middle" dominant-baseline="middle" letter-spacing="-5" style="text-shadow: 0px 8px 0px #CC7EFC;">XP</text>
</svg>